<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiero decirte algo...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    .card {
      position: relative;
      background-color: rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      z-index: 2;
    }

    .card h1 {
      color: #e75480;
    }

    .card p {
      font-size: 1.2rem;
      color: #555;
    }

    .heart {
      font-size: 3rem;
      color: #e75480;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .btn {
      margin-top: 30px;
      background: #e75480;
      border: none;
      color: white;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #d43d6d;
    }

    /* FLORES */
    .flower {
      position: absolute;
      width: 20px;
      height: 20px;
      background: pink;
      border-radius: 50%;
      animation: float 15s linear infinite;
    }

    .flower::before,
    .flower::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: pink;
      border-radius: 50%;
    }

    .flower::before {
      top: -10px;
      left: 0;
    }

    .flower::after {
      top: 0;
      left: -10px;
    }

    .flower2 {
      background: #fddde6;
    }

    .flower2::before,
    .flower2::after {
      background: #fddde6;
    }

    .flower3 {
      background: #ffb6c1;
    }

    .flower3::before,
    .flower3::after {
      background: #ffb6c1;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Posiciones aleatorias */
    .flower:nth-child(1) { left: 10%; animation-delay: 0s; }
    .flower:nth-child(2) { left: 25%; animation-delay: 2s; }
    .flower:nth-child(3) { left: 40%; animation-delay: 4s; }
    .flower:nth-child(4) { left: 55%; animation-delay: 1s; }
    .flower:nth-child(5) { left: 70%; animation-delay: 3s; }
    .flower:nth-child(6) { left: 85%; animation-delay: 5s; }

  </style>
</head>
<body>
  <!-- Flores en el fondo -->
  <div class="flower flower2" style="bottom: -50px;"></div>
  <div class="flower flower3" style="bottom: -60px;"></div>
  <div class="flower" style="bottom: -40px;"></div>
  <div class="flower flower2" style="bottom: -30px;"></div>
  <div class="flower flower3" style="bottom: -70px;"></div>
  <div class="flower" style="bottom: -80px;"></div>

  <!-- Tarjeta central -->
  <div class="container">
    <div class="card">
      <div class="heart">🌸</div>
      <h1>Hola...</h1>
      <p>Quería decirte algo que me cuesta decir en persona</p>
      <p>Me gustas... y mucho... <3</p>
      <p>No sabía cómo decírtelo, así que hice esta página, espero que te guste</p>
      <p>Copyright © 2026 JPC Studios Inc. All rights reserved.</p>
      <button class="btn" onclick="alert('Si le diste al botón, estas viendo este mensaje y significa que si 💖')">¿Tú también sientes lo mismo?</button>
    </div>
  </div>
</body>
</html>
